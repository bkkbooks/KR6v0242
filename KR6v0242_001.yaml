body:
  text: 夫鏡日輝玄啓妙識於淨海澄波洰壑運境目於生源是以八相同紛闢重關於幽夜三輪昺轍闡神機於正路使遊子歸衢輕車迅駕炎宅止焚冰池攸淥故能振馨風於沖漠之野擊玉磬於無聲之鄉遂大鵬奮霄龍翔競湊六合雲翻十方斯集金言演暢豪光九照法界融蕩瓊華七瑩乃塵沙涉靜浪之舟形蒙麾棹之緣於是騰超彼岸濟度無崖必以朝露易晞浮霜難固提河早流皓林促變隱影靈遷圓明息曜三界悲動四生號慕賢徒泣血能言瀝地大聖垂慈敷十二以流導悲愍將來布舍利以昌迹故優填鐫姿育王建塔所在模容流芳万國自爾暨今邁餘千載寺有魏大法師故沙門都法恩起妙因於初心建淨業於無始故童年去或高步緇門逍遙法菀矯志松蘭縕思玄蹤物我俱懷遂捨衣鉢之餘採石名山訪巧求能願雕真容但無常驚逝峰烟激速創福未周奄從物化門徒嗥戀精感彌篤又弟子法度戒行冰朗智超空有仰稟師則磬志忠誠更崇妍瑑妙鏤金顏釋迦怡怡若兜率之趣琦殿彌勒昂昂狀龍華之啓三會多寶同坐事等湧出飛堪絙虛旋瓔反入維摩權形默言於方丈文殊十辭表問疾於平等菩薩諸天簫瑟芙麗金剛密跡獻目楊階飾像雖訖嵩塔未備而度曉夕殷觀成神宇不謂暴疾所鐘潛魂深夜致使營圖中廢為山止匱復有此寺上坐僧惠寺主法合並湛潔內融皎志方外持四攝於胸襟騁七臠於神膺洞博群經智遊無礙緇素同遵歸依各流又邑主朱永隆唐豐七十人等各槃根蘭胄挺茂華芳樤葩槐蕀籍潤斯遠發悟自天契達幽旨普相率厲敦崇邑義以其處也碧地流泉勢俠中都金豪光泗鬱澤新鮮蓊林翠柏璨然在目布寶求園謂莫斯過遂採棟雲臺代木方巖班匠麗功造天宮一區巍巍赫奕媚若祇桓堂堂昺煥婉踰神塔迷者一闞則洗或於先源慧者暫睹則感悟於後際可謂福潤含生祚隆彌劫酬功報德鐫石遐芳其詞曰皎皎淨性洸洸境日湛波啓旭騰源曜質現託王宮曠周遐悉鸞翔翥法斯一大音唱諭名義弗違淨光電掃輕舟返飛浮烟靜霧赫日致遷景覺人天罔歸三千號慟沖影潛空愍彼長迷敷此幽綜爰有哲士紹隆聖蹤雕珉鐫像以表靈容英信等悟磬寶修圖福延彌劫鏡水非虛善潤皇家祚融唐虞蠢爾同津咸契凝如大魏武定三年歲次乙丑七月戊寅朔十五日壬辰樹
